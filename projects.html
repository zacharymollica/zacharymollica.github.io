---
layout: grid
title: Projects
---



            <div class="row">
		   
		   
		   {% assign sorted_pages = site.projects | sort:"order" %}
		   
   		   {% for project in sorted_pages %}
		   	          
					  		
							
							
           <div class="span4 project-grid">
                   <a href="{{ project.url }}">
					   <img src="assets/{{ project.name }}/thumb.jpg">
			   </a>
                  
				   <div class="project-date">
                       {{ project.year }}
                   </div>
				   
                   <div class="project-title">
                        <a href="{{ project.url }}">{{ project.title }}</a>
                   </div>
				   
                   <div class="project-caption">
                       <span>{{ project.content | strip_html | truncate: 150 }}</span>
                   </div>
                   <div class="project-readmore">
                   <a href="{{ project.url }}">Read more</a>
                   </div>


               </div>
		   
		   
	       {% endfor %}
		   
   </div>
