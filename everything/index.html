<script>
  // external js: isotope.pkgd.js
  // init Isotope
  var $grid = $('.grid').isotope({
    itemSelector: '.element-item',
    layoutMode: 'masonry',
    getSortData: {
      name: '.name',
      year: '.year',
    }
  });


  // Randomise order of itemselector Spans
  $grid.isotope({ sortBy : 'random' });

  // layout Isotope after each image loads
  $grid.imagesLoaded().progress(function() {
    $grid.isotope('layout');
  });

  //****************************
  // Isotope Load more button
  //****************************
  var initShow = 15; //number of images loaded on init & onclick load more button
  var counter = initShow; //counter for load more button
  var iso = $grid.data('isotope'); // get Isotope instance

  loadMore(initShow); //execute function onload

  function loadMore(toShow) {
    $grid.find(".hidden").removeClass("hidden");

    var hiddenElems = iso.filteredItems.slice(toShow, iso.filteredItems.length).map(function(item) {
      return item.element;
    });
    $(hiddenElems).addClass('hidden');
    $grid.isotope('layout');

    //when no more to load, hide show more button
    if (hiddenElems.length == 0) {
      $("#load-more").hide();
    } else {
      $("#load-more").show();
    };

  }

  //append load more button
  //Format button here
  $grid.after('<div class="span12"><div id="load-more" class="load-more-btn">+ More Images</div></div>');

  //when load more button clicked
  $("#load-more").click(function() {
    if ($('#filters').data('clicked')) {
      //when filter button clicked, set initial value for counter
      counter = initShow;
      j$('#filters').data('clicked', false);
    } else {
      counter = counter;
    };

    counter = counter + initShow;

    loadMore(counter);
  });





  // filter functions
  var filterFns = {
    // show if number is greater than 50
    numberGreaterThan50: function() {
      var number = $(this).find('.number').text();
      return parseInt(number, 10) > 50;
    },
    // show if name ends with -ium
    ium: function() {
      var name = $(this).find('.name').text();
      return name.match(/ium$/);
    }

  };

  // bind filter button click
  $('#filters').on('click', 'li', function() {
    var filterValue = $(this).attr('data-filter');
    // use filterFn if matches value
    filterValue = filterFns[filterValue] || filterValue;
    $grid.isotope({
      filter: filterValue
    });
  });

  // bind sort button click
  $('#sorts').on('click', 'li', function() {
    var sortByValue = $(this).attr('data-sort-by');
    $grid.isotope({
      sortBy: sortByValue
    });
  });

  // change is-checked class on buttons
  $('.button-group').each(function(i, buttonGroup) {
    var $buttonGroup = $(buttonGroup);
    $buttonGroup.on('click', 'li', function() {
      $buttonGroup.find('.is-checked').removeClass('is-checked');
      $(this).addClass('is-checked');
    });
  });
</script>

      $answer = $(this).next();
      $answer.slideUp(600);
    } else {
      $(".question").removeClass("hello");
      $(this).addClass("hello");
    }
    //getting the next element
    $answer = $(this).next();

    if (!($answer.is(":visible"))) {
      //no - its hidden - slide all the other open tabs to hide
      $(".answer").slideUp(600);
      //open up the content needed
      $answer.slideDown(600);
    } else {
      $(".question").removeClass("hello");
    }
  });
