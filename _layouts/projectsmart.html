<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="http://fonts.googleapis.com/css?family=Source+Sans+Pro:200,300,400,700" media="all">
  </head>
  <body>
	  

	  {% include header.html %}
    
	
	
	<div class="container">
	
<div id="project">

    <div class="content">
		
 <h1>{{ page.title }}</h1>
 
    <div class="projectdate">{{ page.year }}</div>








	{{ content }}
	


	{% for image in site.static_files %}
    {% if image.path contains '/{{ page.name }}'' %}
            {% unless image.path contains 'cover' or image.path contains 'thumb' %}

                <img src="{{ site.baseurl }}{{ image.path }}" alt="image" ">

            {% endunless %}
        {% endif %}
    {% endfor %}
	


	

    </div>
	
</div>
	
</div>

  {% include footer.html %}
	
	
    
  </body>
</html>
